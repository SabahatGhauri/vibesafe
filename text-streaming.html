<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<title>Text-streaming animations — chat UI patterns</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #070707;
  color: #eaeaea;
  font-family: -apple-system, 'Segoe UI', Inter, sans-serif;
  padding: 36px 28px 60px;
}

.page-head { max-width: 1200px; margin: 0 auto 28px; }
.page-head h1 {
  font-size: 1.3rem; font-weight: 600; color: #fff;
  letter-spacing: -0.01em;
}
.page-head p {
  font-size: 0.85rem; color: #888; margin-top: 6px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 300px);
  gap: 18px;
  justify-content: center;
  max-width: 1200px;
  margin: 0 auto;
}

.cell {
  width: 300px; height: 300px;
  background: #101010;
  border: 1px solid #232323;
  border-radius: 14px;
  padding: 14px 14px 12px;
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}

.cell-label {
  position: absolute; top: 10px; right: 12px;
  font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: #555;
}

.thread {
  flex: 1; display: flex; flex-direction: column;
  gap: 10px; margin-top: 18px; overflow: hidden;
}

.msg-user {
  align-self: flex-end;
  background: #f1f1f1; color: #0a0a0a;
  font-size: 0.74rem; line-height: 1.4;
  padding: 6px 11px; border-radius: 12px 12px 2px 12px;
  max-width: 80%;
}

.bot-row { display: flex; gap: 8px; align-items: flex-start; flex: 1; min-height: 0; }

.bot-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  background: #2a2a2a; border: 1px solid #3a3a3a;
  flex-shrink: 0; margin-top: 1px;
}

.bot-text {
  font-size: 0.76rem; line-height: 1.55; color: #d8d8d8;
  flex: 1; min-width: 0;
}

.cursor-blink {
  display: inline-block; width: 2px; height: 0.9em;
  background: #ddd; margin-left: 1px;
  vertical-align: -2px;
  animation: blink 0.9s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.wf-word, .pp-word, .hl-word, .bl-word {
  display: inline-block;
}

.wf-word {
  opacity: 0; transform: translateY(7px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.wf-word.show { opacity: 1; transform: translateY(0); }

.bl-word {
  opacity: 0; filter: blur(6px);
  transition: opacity 0.4s ease, filter 0.4s ease;
}
.bl-word.show { opacity: 1; filter: blur(0); }

.pp-word {
  opacity: 0; transform: scale(0.82);
  transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
.pp-word.show { opacity: 1; transform: scale(1); }

.hl-word {
  border-radius: 4px; padding: 0 2px; margin: 0 -2px;
  transition: background-color 0.35s ease, color 0.35s ease;
}
.hl-word.active { background: #eee; color: #0a0a0a; }

.bn-char {
  display: inline-block;
  opacity: 0; transform: translateY(9px) scale(0.7);
}
.bn-char.show {
  opacity: 1; transform: translateY(0) scale(1);
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.22s ease;
}

.wv-char { display: inline-block; opacity: 0; }
.wv-char.in { animation: waveIn 0.45s ease forwards; }
@keyframes waveIn {
  0%   { transform: translateY(9px); opacity: 0; }
  55%  { transform: translateY(-4px); opacity: 1; }
  100% { transform: translateY(0); opacity: 1; }
}

.dots { display: inline-flex; gap: 4px; align-items: center; height: 1em; }
.dots span {
  width: 5px; height: 5px; border-radius: 50%; background: #999;
  animation: dotPulse 1s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
  40% { transform: scale(1); opacity: 1; }
}

.sc-char { display: inline-block; }
</style>
</head>
<body>

<div class="page-head">
  <h1>Text-streaming animations</h1>
  <p>10 patterns for revealing AI chat responses — 300×300, looping, monochrome.</p>
</div>

<div class="grid" id="grid"></div>

<script>
var QUESTION = 'How do I center a div?';
var ANSWER = 'Set display: flex; then justify-content: center; align-items: center; on the parent element.';

var GLYPHS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*+=';

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function buildCell(label) {
  var cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML =
    '<div class="cell-label">' + label + '</div>' +
    '<div class="thread">' +
      '<div class="msg-user">' + QUESTION + '</div>' +
      '<div class="bot-row">' +
        '<div class="bot-avatar"></div>' +
        '<div class="bot-text"><span class="bot-content"></span></div>' +
      '</div>' +
    '</div>';
  return cell;
}

function wordsOf(text) {
  var parts = text.split(' ');
  return parts.map(function(w, i) { return w + (i < parts.length - 1 ? ' ' : ''); });
}

function animTypewriter(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '<span class="tw-text"></span><span class="cursor-blink"></span>';
    var span = content.querySelector('.tw-text');
    var i = 0;
    var id = setInterval(function() {
      i++;
      span.textContent = ANSWER.slice(0, i);
      if (i >= ANSWER.length) { clearInterval(id); resolve(); }
    }, 24);
  });
}

function animWordFade(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var words = wordsOf(ANSWER);
    var i = 0;
    function next() {
      if (i >= words.length) { resolve(); return; }
      var span = document.createElement('span');
      span.className = 'wf-word';
      span.textContent = words[i];
      content.appendChild(span);
      requestAnimationFrame(function() { span.classList.add('show'); });
      i++;
      setTimeout(next, 110);
    }
    next();
  });
}

function animBlurIn(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var words = wordsOf(ANSWER);
    var i = 0;
    function next() {
      if (i >= words.length) { resolve(); return; }
      var span = document.createElement('span');
      span.className = 'bl-word';
      span.textContent = words[i];
      content.appendChild(span);
      requestAnimationFrame(function() { span.classList.add('show'); });
      i++;
      setTimeout(next, 120);
    }
    next();
  });
}

function animScramble(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var chars = ANSWER.split('').map(function(ch) {
      var span = document.createElement('span');
      span.className = 'sc-char';
      span.textContent = ch === ' ' ? ' ' : GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
      content.appendChild(span);
      return { span: span, final: ch };
    });
    var frame = 0;
    var id = setInterval(function() {
      frame++;
      var allDone = true;
      chars.forEach(function(c, idx) {
        if (c.final === ' ') { c.span.textContent = ' '; return; }
        var revealAt = idx * 0.55;
        if (frame >= revealAt + 4) {
          c.span.textContent = c.final;
        } else if (frame >= revealAt) {
          c.span.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
          allDone = false;
        } else {
          allDone = false;
        }
      });
      if (allDone) { clearInterval(id); resolve(); }
    }, 32);
  });
}

function animLineCascade(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var words = wordsOf(ANSWER);
    var spans = words.map(function(w) {
      var s = document.createElement('span');
      s.textContent = w;
      s.style.opacity = '0';
      s.style.transition = 'opacity 0.3s ease';
      content.appendChild(s);
      return s;
    });
    requestAnimationFrame(function() {
      var lines = [];
      var lastTop = null;
      spans.forEach(function(s) {
        var top = s.offsetTop;
        if (lastTop === null || Math.abs(top - lastTop) > 2) { lines.push([]); lastTop = top; }
        lines[lines.length - 1].push(s);
      });
      var li = 0;
      function nextLine() {
        if (li >= lines.length) { resolve(); return; }
        lines[li].forEach(function(s) { s.style.opacity = '1'; });
        li++;
        setTimeout(nextLine, 360);
      }
      nextLine();
    });
  });
}

function animBounce(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var chars = ANSWER.split('');
    chars.forEach(function(ch) {
      var span = document.createElement('span');
      span.className = 'bn-char';
      span.textContent = ch === ' ' ? ' ' : ch;
      content.appendChild(span);
    });
    var spans = content.querySelectorAll('.bn-char');
    spans.forEach(function(s, i) {
      setTimeout(function() {
        s.classList.add('show');
        if (i === spans.length - 1) setTimeout(resolve, 280);
      }, i * 26);
    });
  });
}

function animThinkThenStream(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    setTimeout(function() {
      content.innerHTML = '';
      var words = wordsOf(ANSWER);
      var i = 0;
      function next() {
        if (i >= words.length) { resolve(); return; }
        var span = document.createElement('span');
        span.textContent = words[i];
        span.style.opacity = '0';
        span.style.transition = 'opacity 0.15s ease';
        content.appendChild(span);
        requestAnimationFrame(function() { span.style.opacity = '1'; });
        i++;
        setTimeout(next, 95);
      }
      next();
    }, 700);
  });
}

function animWave(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var i = 0;
    var id = setInterval(function() {
      var ch = ANSWER[i];
      var span = document.createElement('span');
      span.className = 'wv-char';
      span.textContent = ch === ' ' ? ' ' : ch;
      content.appendChild(span);
      requestAnimationFrame(function() { span.classList.add('in'); });
      i++;
      if (i >= ANSWER.length) { clearInterval(id); setTimeout(resolve, 320); }
    }, 26);
  });
}

function animHighlight(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var words = wordsOf(ANSWER);
    var i = 0;
    function next() {
      if (i >= words.length) { setTimeout(resolve, 280); return; }
      var span = document.createElement('span');
      span.className = 'hl-word active';
      span.textContent = words[i];
      content.appendChild(span);
      (function(s) { setTimeout(function() { s.classList.remove('active'); }, 250); })(span);
      i++;
      setTimeout(next, 140);
    }
    next();
  });
}

function animPop(content) {
  return new Promise(function(resolve) {
    content.innerHTML = '';
    var words = wordsOf(ANSWER);
    var i = 0;
    function next() {
      if (i >= words.length) { setTimeout(resolve, 200); return; }
      var span = document.createElement('span');
      span.className = 'pp-word';
      span.textContent = words[i];
      content.appendChild(span);
      requestAnimationFrame(function() { span.classList.add('show'); });
      i++;
      setTimeout(next, 140);
    }
    next();
  });
}

var ANIMATIONS = [
  { label: '01 Typewriter', fn: animTypewriter },
  { label: '02 Word fade', fn: animWordFade },
  { label: '03 Blur in', fn: animBlurIn },
  { label: '04 Decode scramble', fn: animScramble },
  { label: '05 Line cascade', fn: animLineCascade },
  { label: '06 Letter bounce', fn: animBounce },
  { label: '07 Think then stream', fn: animThinkThenStream },
  { label: '08 Wave hop', fn: animWave },
  { label: '09 Highlight scan', fn: animHighlight },
  { label: '10 Scale pop', fn: animPop }
];

var grid = document.getElementById('grid');

ANIMATIONS.forEach(function(item, idx) {
  var cell = buildCell(item.label);
  grid.appendChild(cell);
  var content = cell.querySelector('.bot-content');

  function cycle() {
    content.style.transition = 'opacity 0.2s ease';
    content.style.opacity = '1';
    item.fn(content).then(function() {
      return sleep(1100);
    }).then(function() {
      content.style.opacity = '0';
      return sleep(220);
    }).then(cycle);
  }

  setTimeout(cycle, idx * 90);
});
</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
