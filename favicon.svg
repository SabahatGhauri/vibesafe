<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A3AAF"/>
    <stop offset="45%" stop-color="#0A1440"/>
    <stop offset="100%" stop-color="#4C1D95"/>
  </linearGradient>
  <linearGradient id="shieldL" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#38BDF8"/>
    <stop offset="100%" stop-color="#6D5BF6"/>
  </linearGradient>
  <linearGradient id="shieldR" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2563EB"/>
    <stop offset="100%" stop-color="#4338CA"/>
  </linearGradient>
  <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7DD3FC"/>
    <stop offset="100%" stop-color="#8B5CF6"/>
  </linearGradient>
</defs>

<!-- rounded-square background -->
<rect width="100" height="100" rx="22" fill="url(#bg)"/>

<!-- outer rim of shield -->
<path d="M50 12
         L79 23 L79 52
         Q79 73 50 86
         Q21 73 21 52
         L21 23 Z"
      fill="url(#rim)"/>

<!-- dark gap between rim and inner shield -->
<path d="M50 17.5
         L74.5 26.5 L74.5 51.5
         Q74.5 69.5 50 80.5
         Q25.5 69.5 25.5 51.5
         L25.5 26.5 Z"
      fill="#0A1030"/>

<!-- inner shield: left half (light) -->
<path d="M50 23
         L50 75.5
         Q30 66 30 50.5
         L30 30 Z"
      fill="url(#shieldL)"/>

<!-- inner shield: right half (dark) -->
<path d="M50 23
         L70 30 L70 50.5
         Q70 66 50 75.5
         Z"
      fill="url(#shieldR)"/>
</svg>
